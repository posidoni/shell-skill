# yaml-language-server: $schema=../schemas/serena-project.schema.json
project_name: "shell-skill"

languages:
- bash
- markdown
- json

encoding: "utf-8"

activation_command:
activation_command_timeout: 180.0
line_ending:
language_backend:

ignore_all_files_in_gitignore: true
ls_specific_settings: {}
ls_workspace_folders:
- "."
ls_additional_workspace_folders: []
ignored_paths:
- ".git/**"
- ".serena/cache/**"
- ".serena/logs/**"

read_only: false
excluded_tools: []
included_optional_tools: []
fixed_tools: []

initial_prompt: |
  Shell Skill Kit publishes cited, test-enforced shell guidance as portable
  Agent Skills plus Claude Code and Codex plugin metadata. Load mem:core first,
  then follow mem:conventions and mem:task_completion before handoff. YAML,
  TOML, and Nushell are validated by repository gates rather than Serena LSPs.

read_only_memory_patterns: []
ignored_memory_patterns: []
default_modes:
added_modes:
symbol_info_budget:
